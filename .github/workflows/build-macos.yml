name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_NAME="omwhisper-build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          CERT_FILE="$RUNNER_TEMP/cert.p12"

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Import certificate into the keychain
          security import "$CERT_FILE" \
            -k "$KEYCHAIN_NAME" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          # Add to keychain search list so codesign can find it
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')

          # Allow codesign to access the key without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

          # Clean up cert file
          rm -f "$CERT_FILE"

      - name: Create cmake toolchain to disable ggml native CPU detection
        run: |
          # GitHub Actions M1 runners fail the cmake CheckCXXSourceRuns i8mm test
          # despite hardware support. ggml then enables MATMUL_INT8 but adds +noi8mm
          # to compile flags, causing always_inline vmmlaq_s32 to conflict.
          # Forcing GGML_NATIVE=OFF via a cmake toolchain file (the only reliable
          # way to inject cache vars into whisper-rs-sys's cmake invocation).
          cat > "$RUNNER_TEMP/ggml-toolchain.cmake" << 'EOF'
          set(GGML_NATIVE OFF CACHE BOOL "Disable native CPU detection for CI" FORCE)
          EOF

      - name: Build Tauri app (sign + notarize)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CMAKE_TOOLCHAIN_FILE: "${{ runner.temp }}/ggml-toolchain.cmake"
        run: npx @tauri-apps/cli build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmWhisper-macOS-DMG
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "omwhisper-build.keychain" || true
